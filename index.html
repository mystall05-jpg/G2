<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>G2 GrandeEngine v2</title>
  <style>
    body{margin:0;background:#000;color:#0f0;font-family:monospace;overflow:hidden}
    #flag{position:fixed;top:10px;right:10px;width:40px;height:25px;background:#f00}
    #flag:after{content:'';position:absolute;top:0;left:0;width:100%;height:50%;background:#000}
    #ui{position:fixed;bottom:10px;left:10px;right:10px;background:#111;padding:8px;border-radius:4px}
    button{background:#0f0;color:#000;border:0;padding:8px;margin:2px;font-weight:700}
    canvas{display:block}
  </style>
</head>
<body>
  <div id="flag" title="T&T"></div>
  <canvas id="c"></canvas>
  <div id="ui">
    <button onclick="spawn()">spawn player</button>
    <button onclick="addBox()">add box</button>
    <button onclick="run()">run</button>
  </div>
  
  <script type="module">
    import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js'
    const canvas=document.getElementById('c')
    const ctx=canvas.getContext('2d')
    canvas.width=innerWidth;canvas.height=innerHeight
    const world=new CANNON.World({gravity:new CANNON.Vec3(0,-9.82,0)})
    const bodies=[];let running=false
    
    function spawn(){const b=new CANNON.Body({mass:1});b.addShape(new CANNON.Sphere(0.5));b.position.set(0,5,0);world.addBody(b);bodies.push(b)}
    function addBox(){const b=new CANNON.Body({mass:1});b.addShape(new CANNON.Box(new CANNON.Vec3(0.5,0.5)));b.position.set((Math.random()-0.5)*4,5,0);world.addBody(b);bodies.push(b)}
    function run(){running=!running;if(running)loop()}
    function loop(){if(!running)return;world.step(1/60);draw();requestAnimationFrame(loop)}
    function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';bodies.forEach(b=>{ctx.beginPath();ctx.arc(canvas.width/2+b.position.x*50,canvas.height/2-b.position.y*50,10,0,7);ctx.fill()})}
    function log(t){console.log(t)}
    window.spawn=spawn;window.addBox=addBox;window.run=run
    addBox();spawn();log('G2 Ready. Tap run.')
  </script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
