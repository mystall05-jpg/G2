<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogie AI Game Factory</title>
    <!-- Tailwind CSS for a futuristic UI -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-2xl mx-auto">

    <header class="text-center my-6">
        <h1 class="text-3xl font-bold text-green-400">🐸 Frogie AI Creator</h1>
        <p class="text-gray-400 text-sm mt-1">Generate & Download Full Standalone Games</p>
    </header>

    <!-- Settings Section -->
    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 mb-6">
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Google Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste AI API key here..." class="w-full p-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white text-sm focus:outline-none focus:border-green-500">
    </div>

    <!-- Input Section -->
    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 mb-6">
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">What game do you want to manufacture?</label>
        <textarea id="prompt" rows="3" placeholder="e.g., A 2D space shooter where you control a frog dodging asteroids. Score points by catching flies." class="w-full p-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white text-sm focus:outline-none focus:border-green-500"></textarea>
        
        <button id="generateBtn" onclick="manufactureGame()" class="w-full mt-4 bg-green-500 hover:bg-green-600 text-gray-900 font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer text-sm tracking-wide">
            🏭 MANUFACTURE GAME
        </button>
    </div>

    <!-- Status & Download Area -->
    <div id="statusBox" class="hidden bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
        <div id="loadingSpinner" class="text-yellow-400 font-medium text-sm animate-pulse mb-2">AI is coding your app... please wait...</div>
        
        <!-- Direct Download Button -->
        <button id="downloadBtn" onclick="triggerDownload()" class="hidden w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer text-sm">
            💾 DOWNLOAD FULL GAME APP (.HTML)
        </button>
    </div>

    <script>
        let manufacturedCode = "";
        let gameTitle = "ai_game";

        async function manufactureGame() {
            const key = document.getElementById('apiKey').value.trim();
            const userPrompt = document.getElementById('prompt').value.trim();
            const statusBox = document.getElementById('statusBox');
            const spinner = document.getElementById('loadingSpinner');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!key) return alert("Please input your Gemini API Key first!");
            if (!userPrompt) return alert("Please describe your game idea!");

            statusBox.classList.remove('hidden');
            spinner.classList.remove('hidden');
            downloadBtn.classList.add('hidden');

            // Sanitize title for file downloading
            gameTitle = userPrompt.toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 20) || "ai_game";

            // Prompt engineering to force the AI to return ONLY clean, self-contained code
            const systemPrompt = "You are a master mobile game developer. Build a complete, single-file HTML/CSS/JavaScript game based on the user request. It must be 100% self-contained, completely functional, visually polished, responsive for mobile touch, and require zero external assets (use canvas drawing, CSS shapes, or emoji for graphics). Return ONLY the raw HTML source code starting with <!DOCTYPE html>. Do not wrap it in markdown code blocks or backticks.";

            try {
                const response = await fetch(`https://googleapis.com{key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${systemPrompt}\n\nUser Game Request: ${userPrompt}` }] }]
                    })
                });

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;

                // Strip accidental markdown if AI ignores instructions
                manufacturedCode = rawText.replace(/```html/g, "").replace(/```/g, "").trim();

                // Show the download capability
                spinner.classList.add('hidden');
                downloadBtn.classList.remove('hidden');
            } catch (err) {
                alert("Factory Error: Could not generate game. Check your API key or connection.");
                statusBox.classList.add('hidden');
                console.error(err);
            }
        }

        // The Straight-To-Downloads Logic
        function triggerDownload() {
            if (!manufacturedCode) return;
            const blob = new Blob([manufacturedCode], { type: "text/html" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${gameTitle}.html`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
