<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>G2 GrandeEngine v2</title>
<style>
body{margin:0;background:#000;color:#0f0;font-family:monospace;overflow:hidden}
#flag{position:fixed;top:10px;right:10px;width:40px;height:25px;background:linear-gradient(to bottom,#ce1126 33%,#000 33%,#000 66%,#fff 66%);z-index:999}
#flag:after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,transparent 45%,#000 45%,#000 55%,transparent 55%)}
#ui{position:fixed;bottom:10px;left:10px;right:10px;background:#111;padding:10px;border:1px solid #0f0}
button{background:#0f0;color:#000;border:0;padding:8px;margin:2px}
canvas{display:block}
</style>
</head>
<body>
<div id="flag" title="T&T"></div>
<canvas id="c"></canvas>
<div id="ui">
<button onclick="spawn()">spawn player</button>
<button onclick="addBox()">add box</button>
<button onclick="run()">run</button>
<div id="log">G2 GrandeEngine v2 Ready. T&T Edition.</div>
</div>
<script type="module">
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm'
const canvas=document.getElementById('c')
const ctx=canvas.getContext('2d')
canvas.width=innerWidth;canvas.height=innerHeight-80
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-9.82,0)})
const bodies=[];let running=false
function spawn(){const b=new CANNON.Body({mass:1,shape:new CANNON.Box(new CANNON.Vec3(1,1,1)),position:new CANNON.Vec3(0,10,0)});world.addBody(b);bodies.push(b);log('player spawned')}
function addBox(){const b=new CANNON.Body({mass:0,shape:new CANNON.Box(new CANNON.Vec3(5,0.5,5)),position:new CANNON.Vec3(0,0,0)});world.addBody(b);bodies.push(b);log('ground added')}
function run(){running=!running;if(running){loop();log('running')}else log('paused')}
function loop(){if(!running)return;world.step(1/60);draw();requestAnimationFrame(loop)}
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';bodies.forEach(b=>{const x=b.position.x*20+canvas.width/2;const y=canvas.height/2-b.position.y*20;ctx.fillRect(x-10,y-10,20,20)})}
function log(t){document.getElementById('log').textContent=t}
window.spawn=spawn;window.addBox=addBox;window.run=run
addBox();spawn();log('G2 Ready. Tap run.')
</script>
</body>
</html>
